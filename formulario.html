<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
     <h2>Formulário</h2>
    <form>
        <label for="nome">Nome:</label><br>
        <input type="text" id="nome" name="nome" required><br>
        <br>


        <label for="idade">Idade:</label><br>
        <input type="number" id="idade" name="idade" required><br>
        <br>


        <label for="data_nascimento">Data de nascimento:</label><br>
        <input type="date" id="data_nascimento" name="Data de nascimento" required><br>
        <br>


        <label for="cidade_natal">Cidade natal:</label><br>
        <input type="text" id="cidade_natal" name="Cidade natal" required><br>
        <br>


        <label for="curso">Curso:</label><br>
        <input type="text" id="curso" name="Curso" required><br>
        <br>


        <label for="cidade_em_que_mora">cidade em que mora:</label><br>
        <input type="text" id="cidade_em_que_mora" name="Cidade em que mora" required><br>
        <br>

        <input type="submit" value="Enviar">
    </form>
</body>
</html>

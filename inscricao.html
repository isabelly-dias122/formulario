<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscrição para o ENEM</title>
</head>
<body>
    <h2>Inscrição ENEM</h2>
    <form>
        <label for="nome">Nome Completo:</label><br>
        <input type="text" name="nome" id="nome" required><br>
        <br>


        <label for="idade">Idade:</label><br>
        <input type="number" id="idade" name="idade" required><br>
        <br>


        <label for="data_nascimento">Data de nascimento</label><br>
        <input type="date" id="data_nascimento" name="Data de nascimento" required><br>
        <br>


        <label for="cpf">CPF:</label><br>
        <input type="text" id="cpf" name="CPF" required><br>
        <br>


        <label for="pai">Nome do pai:</label><br>
        <input type="text" id="pai" name="Nome do pai"><br>
        <input type="radio" id="pai" name="Nome do pai" value="Não consta">Não consta<br>
        <br>


        <label for="mae">Nome da mãe:</label><br>
        <input type="text" id="mae" name="mae"><br>
        <input type="radio" id="mae" name="Nome da mãe" value="Não consta">Não consta<br>
        <br>


        <label for="Responsavel">Responsável legal:</label><br>
        <input type="text" id="Responsavel" name="Responsável legal" required><br>
        <br>


        <label for="nacionalidade">Nacionalidade:</label><br>
        <input type="radio" id="nacionalidade" name="Nacionalidade" value="Brasileiro(a)" required>Brasileiro(a)<br>
        <input type="radio" id="nacionalidade" name="Nacionalidade" value="Brasileiro(a) naturalizado" required>Brasileiro(a) naturalizado<br>
        <input type="radio" id="nacionalidade" name="Nacionalidade" value="Estrangeiro(a)" required>Estrangeiro(a)<br>
        <input type="radio" id="nacionalidade" name="Nacionalidade" value="Brasileiro(a) nato nascido no exterior" 
        required>Brasileiro(a) nato nascido no exterior:<br>
        <br>


        <label for="raca">Raça:</label><br>
        <input type="radio" id="raca" name="Raça" value="Branca" required>Branca<br>
        <input type="radio" id="raca" name="Raça" value="Preta" required>Preta<br>



        

    </form>
</body>
</html>
